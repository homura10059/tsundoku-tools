name = "tsundoku-tools-scraper"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 */4 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "tsundoku-tools"
database_id = "8dd4cdc0-7860-4bf1-8b49-b2f9d6281780"
migrations_dir = "../../packages/db/src/migrations"

[vars]
NOTIFY_MIN_PRICE_DROP_PCT = "5"
NOTIFY_MIN_POINT_CHANGE = "50"
NOTIFY_COOLDOWN_HOURS = "6"

# Secrets (set via: wrangler secret put DISCORD_WEBHOOK_URL / DISCORD_ERROR_WEBHOOK_URL)
# DISCORD_WEBHOOK_URL        — 価格アラート通知先 Discord Webhook URL
# DISCORD_ERROR_WEBHOOK_URL  — スクレイパーエラー通知先 Discord Webhook URL（別チャンネル）
